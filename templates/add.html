<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add Bill</title>
</head>
<body>
  <h1>Add Bill</h1>
  <form method="post">
    <label>Name: <input type="text" name="name" required></label><br>
    <label>Amount: <input type="number" step="0.01" name="amount" required></label><br>
    <label>Due Day (1-28): <input type="number" name="due_day" min="1" max="28" required></label><br>
    <label>Recurring: <input type="checkbox" name="recurring" checked></label><br>
    <button type="submit">Save</button>
  </form>
  <a href="{{ url_for('index') }}">Back</a>
</body>
</html>
